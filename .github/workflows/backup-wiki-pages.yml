name: Backup Wiki Pages

on:
  # Manual trigger only - user can choose category
  workflow_dispatch:
    inputs:
      category:
        description: 'Category to backup'
        required: false
        default: 'main'
        type: choice
        options:
        - main
        - openrailwaymap
        - keys
        - tags
        - templates
        - modules
        - french
        - all

# Prevents multiple backup jobs from running at the exact same time.
# Subsequent triggers will be queued, ensuring they don't fight over git pushes.
concurrency:
  group: wiki-backup
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  backup-wiki-pages:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        # Fetch-depth 0 ensures we have the full history for a cleaner rebase
        fetch-depth: 0
        
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'
        cache: true
        cache-dependency-path: tools/WikiBackup/WikiBackup.csproj

    - name: Restore dependencies
      run: dotnet restore tools/WikiBackup/WikiBackup.csproj
        
    - name: Build project
      run: dotnet build tools/WikiBackup/WikiBackup.csproj -c Release --no-restore

    - name: Run wiki backup
      # The category matches the keys defined in your appsettings.json
      run: dotnet run --project tools/WikiBackup/WikiBackup.csproj --configuration Release -- ${{ inputs.category || 'main' }}
        
    - name: Check for changes
      id: check_changes
      run: |
        # Focus on the specific backup directory defined in settings
        if [[ -n "$(git status --porcelain wiki/backup)" ]]; then
          echo "Changes detected"
          echo "changed=true" >> $GITHUB_OUTPUT
        else
          echo "No changes detected"
          echo "changed=false" >> $GITHUB_OUTPUT
        fi

    - name: Commit and push wiki backup
      if: steps.check_changes.outputs.changed == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # 1. Stage all changes (including the generated README.md)
        git add wiki/backup
        git commit --no-verify -m "Backup wiki pages: ${{ inputs.category || 'main' }} [skip ci]" || exit 0
        
        # 2. Pull the latest changes from origin
        git pull --rebase origin main        
        
        # 3. Push to the main branch
        git push origin main

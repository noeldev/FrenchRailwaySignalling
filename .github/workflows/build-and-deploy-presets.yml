name: Build and Deploy Presets

on:
  push:
    paths:
      - 'presets/**'
      - 'tools/TagInfoGen/**'   # taginfo: regenerate when the generator changes
      - '.github/pages/index.html'
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  ARCHIVE_NAME: French_Railway_Signalling_presets.zip
  PRESET_FILE: presets/French_Railway_Signalling.xml
  TAGINFO_PROJECT: tools/TagInfoGen/TagInfoGen.csproj

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate XML syntax
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-utils
          xmllint --noout ${{ env.PRESET_FILE }}

      - name: Create presets archive
        run: |
          rm -f ${{ env.ARCHIVE_NAME }}
          cd presets
          zip -r ../${{ env.ARCHIVE_NAME }} . -x "*.git*" "*.DS_Store*" "*.tmp*"
          cd ..

      - name: Prepare GitHub Pages content
        run: |
          mkdir -p public
          cp ${{ env.ARCHIVE_NAME }} public/
          cp .github/pages/index.html public/

      # --- taginfo: build the generator and emit taginfo.json into public/ ---
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
          cache: true
          cache-dependency-path: ${{ env.TAGINFO_PROJECT }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.TAGINFO_PROJECT }}

      - name: Build project
        run: dotnet build ${{ env.TAGINFO_PROJECT }} -c Release --no-restore

      - name: Generate taginfo.json
        # Writes taginfo.json into public/ (published with the Pages content);
        # the taginfo.md log stays at the repo root.
        run: dotnet run --project ${{ env.TAGINFO_PROJECT }} --configuration Release --no-build --no-restore -- ${{ env.PRESET_FILE }} public/taginfo.json taginfo.md

      - name: Upload taginfo log
        uses: actions/upload-artifact@v4
        with:
          name: taginfo-log
          path: taginfo.md

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
